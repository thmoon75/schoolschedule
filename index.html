<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="문서율 시간표 - 고등학생을 위한 예쁜 시간표 관리 사이트" />
  <title>문서율 시간표</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== 헤더 ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title-area">
        <h1 class="site-title">&#127800; 문서율 시간표</h1>
        <p class="site-subtitle">나만의 시간표를 예쁘게 꾸며봐요 ✨</p>
      </div>
      <!-- 주요 액션 버튼 (인쇄 시 숨김) -->
      <div class="header-actions no-print">
        <button class="btn btn-primary" onclick="saveSnapshot()">💾 저장하기</button>
        <button class="btn btn-secondary" onclick="openLoadModal()">📂 불러오기</button>
        <button class="btn btn-outline" onclick="printTimetable()">🖨️ 출력하기</button>
      </div>
    </div>
  </header>

  <!-- ===== 토스트 알림 (저장/불러오기 성공·실패 메시지) ===== -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <!-- ===== 메인 컨텐츠 ===== -->
  <main class="container">

    <!-- ─── 시간표 영역 ─── -->
    <section class="card timetable-card" id="timetableSection">
      <div class="card-header">
        <h2 class="card-title">📋 내 시간표</h2>
        <!-- 수업이 없을 때 안내 문구 -->
        <span class="empty-hint" id="emptyHint">
          아직 수업이 없어요. 아래에서 수업을 추가해봐요! 🎒
        </span>
      </div>
      <!-- 모바일에서 테이블이 가로 스크롤되도록 감싸는 div -->
      <div class="timetable-wrapper">
        <table class="timetable" id="timetableTable">
          <thead>
            <tr>
              <th class="period-header">교시</th>
              <th class="day-header">월요일</th>
              <th class="day-header">화요일</th>
              <th class="day-header">수요일</th>
              <th class="day-header">목요일</th>
              <th class="day-header">금요일</th>
            </tr>
          </thead>
          <!-- 행은 script.js에서 동적으로 생성 -->
          <tbody id="timetableBody"></tbody>
        </table>
      </div>
    </section>

    <!-- ─── 편집 영역 (추가 폼 + 과목 관리) ─── -->
    <div class="edit-grid no-print">

      <!-- 수업 추가 / 수정 폼 -->
      <section class="card form-card">
        <div class="card-header">
          <h2 class="card-title" id="formTitle">✏️ 수업 추가하기</h2>
        </div>

        <form id="itemForm" onsubmit="handleFormSubmit(event)" autocomplete="off">

          <!-- 요일 + 교시 선택 -->
          <div class="form-row">
            <div class="form-group">
              <label for="inputDay">요일</label>
              <select id="inputDay" required>
                <option value="월">월요일</option>
                <option value="화">화요일</option>
                <option value="수">수요일</option>
                <option value="목">목요일</option>
                <option value="금">금요일</option>
              </select>
            </div>
            <div class="form-group">
              <label for="inputPeriod">교시</label>
              <select id="inputPeriod" onchange="handlePeriodChange()" required>
                <option value="1교시">1교시</option>
                <option value="2교시">2교시</option>
                <option value="3교시">3교시</option>
                <option value="4교시">4교시</option>
                <option value="5교시">5교시</option>
                <option value="6교시">6교시</option>
                <option value="7교시">7교시</option>
                <option value="8교시">8교시</option>
                <option value="custom">직접 입력 ✍️</option>
              </select>
            </div>
          </div>

          <!-- 교시 직접 입력 (숨겨져 있다가 '직접 입력' 선택 시 표시) -->
          <div class="form-group" id="customPeriodGroup" style="display:none;">
            <label for="inputCustomPeriod">직접 입력 (예: 0교시, 야자1)</label>
            <input type="text" id="inputCustomPeriod" placeholder="교시 또는 시간을 직접 입력해주세요" />
          </div>

          <!-- 과목 + 교실 입력 -->
          <div class="form-row">
            <div class="form-group">
              <label for="inputSubject">과목</label>
              <!-- 선택 목록은 script.js에서 가나다순으로 채워짐 -->
              <select id="inputSubject" onchange="handleSubjectChange()" required></select>
            </div>
            <div class="form-group">
              <label for="inputClassroom">교실 (선택)</label>
              <input type="text" id="inputClassroom" placeholder="예: 1-1반, 과학실" />
            </div>
          </div>

          <!-- 색상 선택 -->
          <div class="form-group">
            <label>색상 선택</label>
            <div id="colorPicker" class="color-picker">
              <!-- 15개 색상 버튼은 script.js에서 생성 -->
            </div>
            <!-- 선택된 색상을 담는 hidden input -->
            <input type="hidden" id="selectedColor" />
          </div>

          <!-- 폼 버튼 -->
          <div class="form-buttons">
            <button type="submit" class="btn btn-primary" id="submitBtn">+ 추가하기</button>
            <button type="button" class="btn btn-ghost" id="cancelEditBtn"
              onclick="cancelEdit()" style="display:none;">취소</button>
          </div>

        </form>
      </section>

      <!-- 과목 관리 섹션 -->
      <section class="card subjects-card">
        <div class="card-header">
          <h2 class="card-title">📚 과목 목록</h2>
        </div>
        <p class="subjects-hint">✕ 버튼으로 과목을 시간표에서 일시적으로 숨길 수 있어요</p>

        <!-- 과목 칩 목록 (script.js에서 채워짐) -->
        <div id="subjectList" class="subject-list"></div>

        <!-- 새 과목 추가 입력 -->
        <div class="add-subject-row">
          <input type="text" id="newSubjectInput"
            placeholder="새 과목명 입력 후 추가"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addSubject();}" />
          <button class="btn btn-small btn-primary" onclick="addSubject()">+ 추가</button>
        </div>
      </section>

    </div><!-- /.edit-grid -->

  </main><!-- /.container -->


  <!-- ===== 불러오기 모달 ===== -->
  <div id="loadModal" class="modal-overlay" style="display:none;"
    onclick="closeLoadModalOutside(event)" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">📂 저장된 시간표 불러오기</h3>
        <button class="modal-close" onclick="closeLoadModal()" aria-label="닫기">✕</button>
      </div>
      <div class="modal-body">
        <!-- 스냅샷 목록 (script.js에서 채워짐) -->
        <div id="snapshotList"></div>
      </div>
    </div>
  </div>


  <!-- ===== 수업 셀 클릭 팝업 (수정 / 삭제) ===== -->
  <!-- 팝업 배경 오버레이 -->
  <div id="popupOverlay" class="popup-overlay" style="display:none;" onclick="closeItemPopup()"></div>
  <!-- 팝업 본체 -->
  <div id="itemPopup" class="item-popup" style="display:none;" role="dialog" aria-modal="true">
    <div class="item-popup-inner">
      <p id="popupSubjectName" class="popup-subject"></p>
      <p id="popupInfo" class="popup-info"></p>
      <div class="popup-buttons">
        <button class="btn btn-small btn-secondary" onclick="editItemFromPopup()">✏️ 수정</button>
        <button class="btn btn-small btn-danger" onclick="deleteItemFromPopup()">🗑️ 삭제</button>
        <button class="btn btn-small btn-ghost" onclick="closeItemPopup()">닫기</button>
      </div>
    </div>
  </div>


  <script src="script.js"></script>
</body>
</html>
