<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="문서율 시간표 - 고등학생을 위한 예쁜 시간표 관리 사이트" />
  <title>문서율 시간표</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== 헤더 ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title-area">
        <h1 class="site-title">&#127800; 문서율 시간표</h1>
        <p class="site-subtitle">나만의 시간표를 예쁘게 꾸며봐요 ✨</p>
      </div>
      <div class="header-controls no-print">
        <button class="btn-theme-toggle" id="themeToggleBtn" onclick="toggleTheme()" title="다크/라이트 모드 전환">🌙</button>
        <div class="header-actions">
          <button class="btn btn-primary" id="saveBtn" onclick="onSaveButtonClick()">💾 저장하기</button>
          <button class="btn btn-secondary" onclick="openLoadModal()">📂 불러오기</button>
          <button class="btn btn-outline" onclick="printTimetable()">🖨️ 출력하기</button>
          <button class="btn btn-export" onclick="exportTimetable()" title="시간표를 파일로 내보내기">📤 내보내기</button>
          <button class="btn btn-export" onclick="importTimetable()" title="파일에서 시간표 가져오기">📥 가져오기</button>
          <!-- 가져오기용 숨김 input -->
          <input type="file" id="importFileInput" accept=".json" style="display:none;" onchange="handleImportFile(event)" />
        </div>
      </div>
    </div>
  </header>

  <!-- 토스트 알림 -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <!-- ===== 메인 ===== -->
  <main class="container">

    <!-- 시간표 섹션 -->
    <section class="card timetable-card" id="timetableSection">
      <div class="card-header">
        <h2 class="card-title">📋 내 시간표</h2>
        <span class="empty-hint" id="emptyHint">셀의 + 버튼을 눌러 수업을 추가해봐요! 🎒</span>
      </div>

      <!-- 데스크탑: 표 형식 (모바일에서 숨김) -->
      <div class="desktop-view timetable-inner-wrap" id="desktopTimetable">
        <table class="timetable" id="timetableTable">
          <thead>
            <tr>
              <th class="period-header">교시</th>
              <th class="day-header">월요일</th>
              <th class="day-header">화요일</th>
              <th class="day-header">수요일</th>
              <th class="day-header">목요일</th>
              <th class="day-header">금요일</th>
            </tr>
          </thead>
          <tbody id="timetableBody"></tbody>
        </table>
        <!-- 데스크탑용 다른 교시 추가 버튼 -->
        <div class="custom-add-row no-print">
          <button class="btn btn-outline btn-small" onclick="openAddModalFull()">
            ✍️ 다른 교시에 추가하기
          </button>
        </div>
      </div>

      <!-- 모바일: 탭 형식 (데스크탑에서 숨김) -->
      <div class="mobile-view" id="mobileTimetable">

        <!-- 뷰 모드 탭: 전체 표 / 요일별 -->
        <div class="view-mode-tabs" id="viewModeTabs">
          <button class="view-mode-tab active" onclick="selectViewMode('full')" data-mode="full">📊 전체 표</button>
          <button class="view-mode-tab" onclick="selectViewMode('day')" data-mode="day">📅 요일별</button>
        </div>

        <!-- 전체 표 뷰 (기본) -->
        <div id="mobileFullView" class="mobile-full-view">
          <div class="mobile-full-table-wrap" id="mobileFullTableWrap"></div>
          <div class="mobile-custom-add no-print">
            <button class="btn btn-outline btn-small" onclick="openAddModalFull()">
              ✍️ 다른 교시에 추가하기
            </button>
          </div>
        </div>

        <!-- 요일별 뷰 -->
        <div id="mobileDayView" class="mobile-day-view" style="display:none;">
          <!-- 요일 탭 -->
          <div class="day-tabs" id="dayTabs">
            <button class="day-tab active" onclick="selectDayTab('월')" data-day="월">월</button>
            <button class="day-tab" onclick="selectDayTab('화')" data-day="화">화</button>
            <button class="day-tab" onclick="selectDayTab('수')" data-day="수">수</button>
            <button class="day-tab" onclick="selectDayTab('목')" data-day="목">목</button>
            <button class="day-tab" onclick="selectDayTab('금')" data-day="금">금</button>
          </div>
          <!-- 선택된 요일의 교시 목록 -->
          <div id="mobileDayContent" class="mobile-day-content"></div>
          <!-- 다른 교시 추가 버튼 -->
          <div class="mobile-custom-add no-print">
            <button class="btn btn-outline btn-small" onclick="openAddModalFull()">
              ✍️ 다른 교시에 추가하기
            </button>
          </div>
        </div>

      </div>
    </section>

    <!-- 과목 관리 섹션 -->
    <section class="card subjects-card no-print">
      <div class="card-header">
        <h2 class="card-title">📚 과목 목록</h2>
      </div>
      <p class="subjects-hint">✕ 버튼으로 과목을 드롭다운에서 일시적으로 숨길 수 있어요</p>
      <div id="subjectList" class="subject-list"></div>
      <div class="add-subject-row">
        <input type="text" id="newSubjectInput"
          placeholder="새 과목명 입력 후 추가"
          onkeydown="if(event.key==='Enter'){event.preventDefault();addSubject();}" />
        <button class="btn btn-small btn-primary" onclick="addSubject()">+ 추가</button>
      </div>
    </section>

  </main>


  <!-- ===== 수업 추가 / 수정 모달 ===== -->
  <div id="addEditModal" class="modal-overlay" style="display:none;"
       onclick="closeAddEditModalOutside(event)" role="dialog" aria-modal="true">
    <div class="modal modal-form">

      <div class="modal-header">
        <div>
          <h3 class="modal-title" id="addEditModalTitle">수업 추가하기</h3>
          <!-- 추가 모드: "월요일 · 1교시" 같은 컨텍스트 표시 -->
          <p class="modal-context-text" id="addEditContext"></p>
        </div>
        <button class="modal-close" onclick="closeAddEditModal()" aria-label="닫기">✕</button>
      </div>

      <div class="modal-body">

        <!-- 요일·교시 선택 (수정 모드 또는 직접입력 모드에서만 표시) -->
        <div id="modalDayPeriodFields" style="display:none;">
          <div class="form-row">
            <div class="form-group">
              <label for="modalDay">요일</label>
              <select id="modalDay">
                <option value="월">월요일</option>
                <option value="화">화요일</option>
                <option value="수">수요일</option>
                <option value="목">목요일</option>
                <option value="금">금요일</option>
              </select>
            </div>
            <div class="form-group">
              <label for="modalPeriod">교시</label>
              <select id="modalPeriod" onchange="handleModalPeriodChange()">
                <option value="1교시">1교시</option>
                <option value="2교시">2교시</option>
                <option value="3교시">3교시</option>
                <option value="4교시">4교시</option>
                <option value="5교시">5교시</option>
                <option value="6교시">6교시</option>
                <option value="7교시">7교시</option>
                <option value="custom">직접 입력 ✍️</option>
              </select>
            </div>
          </div>
          <div class="form-group" id="modalCustomPeriodGroup" style="display:none;">
            <label for="modalCustomPeriod">직접 입력 (예: 0교시, 야자1)</label>
            <input type="text" id="modalCustomPeriod" placeholder="교시 또는 시간 직접 입력" />
          </div>
        </div>

        <!-- 과목 선택 -->
        <div class="form-group">
          <label for="modalSubject">과목</label>
          <select id="modalSubject" onchange="handleModalSubjectChange()"></select>
        </div>

        <!-- 교실 입력 -->
        <div class="form-group">
          <label for="modalClassroom">교실 (선택)</label>
          <input type="text" id="modalClassroom" placeholder="예: 1-1반, 과학실" />
        </div>

        <!-- 메모 입력 -->
        <div class="form-group">
          <label for="modalMemo">메모 (선택)</label>
          <textarea id="modalMemo" placeholder="수행평가, 준비물, 과제 등 메모를 입력해보세요" rows="2"></textarea>
        </div>

        <!-- 색상 선택 -->
        <div class="form-group">
          <label>색상 선택</label>
          <div id="modalColorPicker" class="color-picker"></div>
          <input type="hidden" id="modalColor" />
        </div>

        <!-- 버튼 영역 -->
        <div class="form-buttons">
          <button class="btn btn-primary" id="modalSubmitBtn" onclick="submitAddEditModal()">추가하기</button>
          <button class="btn btn-danger" id="modalDeleteBtn"
                  onclick="deleteFromModal()" style="display:none;">🗑️ 삭제하기</button>
          <button class="btn btn-ghost" onclick="closeAddEditModal()">취소</button>
        </div>

      </div>
    </div>
  </div>


  <!-- ===== 불러오기 모달 ===== -->
  <div id="loadModal" class="modal-overlay" style="display:none;"
       onclick="closeLoadModalOutside(event)" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">📂 저장된 시간표 불러오기</h3>
        <button class="modal-close" onclick="closeLoadModal()" aria-label="닫기">✕</button>
      </div>
      <div class="modal-body">
        <div id="snapshotList"></div>
      </div>
    </div>
  </div>


  <!-- ===== 메모 팝업 (전체 표에서 과목 터치 시) ===== -->
  <div id="memoPopup" class="memo-popup-overlay" style="display:none;"
       onclick="closeMemoPopup()" role="dialog" aria-modal="true">
    <div class="memo-popup" onclick="event.stopPropagation()">
      <div class="memo-popup-header" id="memoPopupHeader">
        <div>
          <span class="memo-popup-subject" id="memoPopupSubject"></span>
          <span class="memo-popup-classroom" id="memoPopupClassroom"></span>
        </div>
        <button class="modal-close" onclick="closeMemoPopup()" aria-label="닫기">✕</button>
      </div>
      <div class="memo-popup-body">
        <p class="memo-popup-text" id="memoPopupText"></p>
      </div>
      <div class="memo-popup-footer">
        <button class="btn btn-primary btn-small" id="memoPopupEditBtn">✏️ 수정하기</button>
        <button class="btn btn-ghost btn-small" onclick="closeMemoPopup()">닫기</button>
      </div>
    </div>
  </div>

  <!-- 모바일 하단 고정 바 (모바일에서만 표시) -->
  <div class="mobile-bottom-bar no-print" id="mobileBottomBar">
    <button class="bottom-bar-btn" onclick="onSaveButtonClick()" id="saveBtnMobile">
      <span class="bottom-bar-icon">💾</span>
      <span class="bottom-bar-label">저장</span>
    </button>
    <button class="bottom-bar-btn" onclick="openLoadModal()">
      <span class="bottom-bar-icon">📂</span>
      <span class="bottom-bar-label">불러오기</span>
    </button>
    <button class="bottom-bar-btn" onclick="printTimetable()">
      <span class="bottom-bar-icon">🖨️</span>
      <span class="bottom-bar-label">출력</span>
    </button>
    <button class="bottom-bar-btn" onclick="exportTimetable()">
      <span class="bottom-bar-icon">📤</span>
      <span class="bottom-bar-label">내보내기</span>
    </button>
    <button class="bottom-bar-btn" onclick="importTimetable()">
      <span class="bottom-bar-icon">📥</span>
      <span class="bottom-bar-label">가져오기</span>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
